{% load bonus_filters %}
{% load static %}
<link rel="stylesheet" href="{% static 'style/web_links.css' %}">

{% if link_set|length > 0 %}
<div class="web-links">
    {% for web in link_set|order_web_links %}
        <span>
            <a href="{{ web.link }}">
                <img {%if web.type == "WW" %} class="dark-invert" {%endif%} src="{{ web.get_logo }}" alt="{{ web.alt }}">
                <span class="spacer"></span>
                {{web.get_display}}
            </a>
        </span>
    {% endfor %}
</div>
{%endif%}
